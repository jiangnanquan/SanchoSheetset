name: Build Desktop Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_script: npm run dist:win
            artifact_glob: release/*.exe
            artifact_name: sancho-sheetset-windows-x64
          - os: macos-latest
            build_script: npm run dist:mac -- --arm64
            artifact_glob: release/*.dmg
            artifact_name: sancho-sheetset-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: ${{ matrix.build_script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: false
          body: |
            SanchoSheetset ${{ github.ref_name }}

            下载资产只保留：
            - macOS Apple Silicon `.dmg`
            - Windows x64 `.exe`
